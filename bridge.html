<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sign in with Chat Bubble</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,200;0,9..144,300;1,9..144,200&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:           #0b0b0d;
  --surface:      #131316;
  --surface2:     #1a1a1f;
  --surface3:     #202026;
  --border:       #252529;
  --border-strong:#333339;
  --text:         #e4e2dc;
  --text-muted:   #565660;
  --text-dim:     #353540;
  --accent:       #4ade80;
  --accent-dim:   #162a1e;
  --danger:       #f87171;
  --mono:         'DM Mono', monospace;
  --serif:        'Fraunces', serif;
}

html, body {
  height: 100%; background: var(--bg); color: var(--text);
  font-family: var(--mono); font-size: 13px; line-height: 1.6;
  overflow: hidden;
}

.wrap {
  min-height: 100vh; display: flex; align-items: center;
  justify-content: center; padding: 20px; position: relative;
}

.grid-bg {
  position: fixed; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(74,222,128,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(74,222,128,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
}
.glow {
  position: fixed; width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(74,222,128,0.05) 0%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
}

.card {
  width: 360px; max-width: 100%;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 28px;
  box-shadow: 0 32px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.03) inset;
  position: relative; z-index: 1;
  animation: cardIn 0.4s cubic-bezier(0.2,0,0,1);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
.brand-logo {
  width: 30px; height: 30px;
  background: var(--accent-dim); border: 1px solid rgba(74,222,128,0.2);
  border-radius: 8px; display: grid; place-items: center;
}
.brand-logo svg { width: 14px; height: 14px; stroke: var(--accent); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
.brand-name { font-family: var(--serif); font-weight: 200; font-size: 16px; letter-spacing: -0.3px; }

/* connecting pill */
.from-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 12px; margin-bottom: 20px; font-size: 11px; color: var(--text-muted);
}
.from-pill-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; animation: pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.from-pill strong { color: var(--text); font-weight: 400; }

.title { font-family: var(--serif); font-weight: 200; font-size: 22px; letter-spacing: -0.5px; margin-bottom: 4px; }
.subtitle { font-size: 11px; color: var(--text-muted); margin-bottom: 22px; }

.form-field { margin-bottom: 13px; }
.form-label { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 5px; }
.form-input {
  width: 100%; padding: 10px 13px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: var(--mono);
  font-size: 13px; outline: none; transition: border-color 0.15s, background 0.15s;
}
.form-input:focus { border-color: var(--accent); background: var(--surface3); }
.form-input::placeholder { color: var(--text-dim); }

.btn {
  width: 100%; padding: 11px; border-radius: 9px; border: none;
  background: var(--accent); color: #061208; font-family: var(--mono);
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; margin-top: 4px;
}
.btn:hover { filter: brightness(1.08); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(74,222,128,0.2); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; box-shadow: none; }

.error {
  background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.2);
  border-radius: 7px; padding: 9px 13px; font-size: 12px; color: var(--danger);
  margin-bottom: 14px; display: none; line-height: 1.5;
}
.error.visible { display: block; }

/* success state */
.success-state {
  display: none; flex-direction: column; align-items: center;
  text-align: center; padding: 8px 0 4px; gap: 10px;
}
.success-state.visible { display: flex; animation: cardIn 0.3s cubic-bezier(0.2,0,0,1); }
.success-icon {
  width: 52px; height: 52px; border-radius: 14px;
  background: var(--accent-dim); border: 1px solid rgba(74,222,128,0.25);
  display: grid; place-items: center; font-size: 22px; margin-bottom: 4px;
}
.success-title { font-family: var(--serif); font-weight: 200; font-size: 20px; letter-spacing: -0.4px; }
.success-sub { font-size: 12px; color: var(--text-muted); line-height: 1.6; }
.success-user {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; width: 100%;
  display: flex; align-items: center; gap: 10px;
}
.success-avatar {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--accent-dim); border: 1px solid rgba(74,222,128,0.2);
  display: grid; place-items: center; font-family: var(--serif);
  font-size: 14px; color: var(--accent); text-transform: uppercase; flex-shrink: 0;
}
.success-info { flex: 1; text-align: left; }
.success-name { font-size: 13px; color: var(--text); }
.success-email { font-size: 10px; color: var(--text-muted); }

.countdown { font-size: 11px; color: var(--text-dim); }
.countdown span { color: var(--accent); }

/* loading spinner */
.spinner {
  display: none; width: 16px; height: 16px; border: 2px solid rgba(6,18,8,0.3);
  border-top-color: #061208; border-radius: 50%;
  animation: spin 0.7s linear infinite; margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.already-logged-in { display: none; flex-direction: column; gap: 12px; }
.already-logged-in.visible { display: flex; animation: cardIn 0.3s cubic-bezier(0.2,0,0,1); }
.user-chip {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 14px;
}
.user-chip-avatar {
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--accent-dim); border: 1px solid rgba(74,222,128,0.2);
  display: grid; place-items: center; font-family: var(--serif);
  font-size: 15px; color: var(--accent); text-transform: uppercase; flex-shrink: 0;
}
.user-chip-info { flex: 1; }
.user-chip-name { font-size: 13px; color: var(--text); }
.user-chip-sub { font-size: 10px; color: var(--text-muted); }
.user-chip-badge {
  font-size: 9px; color: var(--accent); background: var(--accent-dim);
  border: 1px solid rgba(74,222,128,0.2); border-radius: 4px; padding: 2px 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}

.btn-secondary {
  width: 100%; padding: 10px; border-radius: 9px;
  border: 1px solid var(--border); background: none;
  font-family: var(--mono); font-size: 12px; color: var(--text-muted);
  cursor: pointer; transition: all 0.15s;
}
.btn-secondary:hover { color: var(--text); border-color: var(--border-strong); background: var(--surface2); }
</style>
</head>
<body>
<div class="wrap">
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div class="card">
    <div class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      </div>
      <span class="brand-name">Chat Bubble</span>
    </div>

    <div class="from-pill">
      <div class="from-pill-dot"></div>
      <span>Authorization request from <strong>Bubble</strong></span>
    </div>

    <!-- ALREADY LOGGED IN STATE -->
    <div class="already-logged-in" id="already-state">
      <div class="title">You're already in.</div>
      <div class="subtitle">Authorize Bubble to use your Chat Bubble account.</div>
      <div class="user-chip" id="user-chip">
        <div class="user-chip-avatar" id="chip-avatar">?</div>
        <div class="user-chip-info">
          <div class="user-chip-name" id="chip-name">—</div>
          <div class="user-chip-sub" id="chip-email">—</div>
        </div>
        <div class="user-chip-badge">Active</div>
      </div>
      <button class="btn" onclick="doAuthorize()">
        <div class="spinner" id="auth-spinner"></div>
        <span id="auth-btn-text">Authorize & Continue</span>
      </button>
      <button class="btn-secondary" onclick="doSignOut()">Sign in as someone else</button>
    </div>

    <!-- LOGIN FORM STATE -->
    <div id="login-state">
      <div class="title">Sign in to authorize.</div>
      <div class="subtitle">Use your Chat Bubble credentials to grant access to Bubble.</div>
      <div class="error" id="login-error"></div>
      <div class="form-field">
        <label class="form-label">Email</label>
        <input class="form-input" id="login-email" type="email" placeholder="you@email.com" autocomplete="email">
      </div>
      <div class="form-field">
        <label class="form-label">Password</label>
        <input class="form-input" id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn" id="login-btn" onclick="doLogin()">
        <div class="spinner" id="login-spinner"></div>
        <span id="login-btn-text">Sign In & Authorize</span>
      </button>
    </div>

    <!-- SUCCESS STATE -->
    <div class="success-state" id="success-state">
      <div class="success-icon">✓</div>
      <div class="success-title">Authorized.</div>
      <div class="success-user" id="success-user-chip">
        <div class="success-avatar" id="success-avatar">?</div>
        <div class="success-info">
          <div class="success-name" id="success-name">—</div>
          <div class="success-email" id="success-email">—</div>
        </div>
      </div>
      <div class="success-sub">Returning you to Bubble…</div>
      <div class="countdown">Closing in <span id="countdown-num">3</span>s</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://wkgjqpcjoctfoovdtbxf.supabase.co';
const SUPABASE_ANON = 'sb_publishable_GEMM0Aw5hDIH7QNV_Uq_hQ_iSE5LeO7';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// Only allow postMessage to Bubble's origin
const BUBBLE_ORIGIN = 'https://partials-gh.github.io';

let currentUser = null, currentProfile = null;

async function init() {
  // Verify this was opened by Bubble
  const params = new URLSearchParams(window.location.search);
  const source = params.get('source');
  if (source !== 'bubble') {
    // Still allow it but don't auto-close if no opener
  }

  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadProfile();
    showAlreadyLoggedIn();
  } else {
    showLoginForm();
  }
}

async function loadProfile() {
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  currentProfile = data;
}

function showAlreadyLoggedIn() {
  document.getElementById('login-state').style.display = 'none';
  document.getElementById('already-state').classList.add('visible');
  const initial = ((currentProfile?.username || currentUser.email || '?')[0]).toUpperCase();
  document.getElementById('chip-avatar').textContent = initial;
  document.getElementById('chip-name').textContent = currentProfile?.username || currentUser.email;
  document.getElementById('chip-email').textContent = currentUser.email;
}

function showLoginForm() {
  document.getElementById('already-state').classList.remove('visible');
  document.getElementById('login-state').style.display = 'block';
  setTimeout(() => document.getElementById('login-email')?.focus(), 100);
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw    = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  const spinner = document.getElementById('login-spinner');
  const btnText = document.getElementById('login-btn-text');

  errEl.classList.remove('visible');
  if (!email || !pw) { showError(errEl, 'Please fill in all fields.'); return; }

  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.style.display = 'block';
    showError(errEl, error.message);
    return;
  }
  currentUser = data.user;
  await loadProfile();
  await doAuthorize();
}

async function doAuthorize() {
  const btn     = document.getElementById('auth-btn-text') || document.getElementById('login-btn-text');
  const spinner = document.getElementById('auth-spinner') || document.getElementById('login-spinner');

  // Show spinner on whichever button is visible
  const authBtn = document.getElementById('already-state').classList.contains('visible')
    ? document.getElementById('already-state').querySelector('.btn')
    : document.getElementById('login-btn');
  authBtn.disabled = true;
  const sp = authBtn.querySelector('.spinner');
  const tx = authBtn.querySelector('span');
  if (sp) sp.style.display = 'block';
  if (tx) tx.style.display = 'none';

  // Write to bubble_sessions table in Chat Bubble's DB
  await sb.from('bubble_sessions').upsert({
    user_id:    currentUser.id,
    username:   currentProfile?.username || '',
    email:      currentUser.email,
    authorized: true,
    authorized_at: new Date().toISOString()
  }, { onConflict: 'user_id' });

  // Send message to Bubble opener
  const payload = {
    type:     'CHATBUBBLE_AUTH_SUCCESS',
    user_id:  currentUser.id,
    username: currentProfile?.username || '',
    email:    currentUser.email,
  };

  if (window.opener) {
    window.opener.postMessage(payload, BUBBLE_ORIGIN);
  }

  // Show success state
  showSuccess();
}

function showSuccess() {
  document.getElementById('already-state').classList.remove('visible');
  document.getElementById('login-state').style.display = 'none';
  const ss = document.getElementById('success-state');
  ss.classList.add('visible');

  const initial = ((currentProfile?.username || currentUser.email || '?')[0]).toUpperCase();
  document.getElementById('success-avatar').textContent = initial;
  document.getElementById('success-name').textContent = currentProfile?.username || currentUser.email;
  document.getElementById('success-email').textContent = currentUser.email;

  // Countdown and close
  let count = 3;
  const cd = document.getElementById('countdown-num');
  const interval = setInterval(() => {
    count--;
    cd.textContent = count;
    if (count <= 0) {
      clearInterval(interval);
      window.close();
    }
  }, 1000);
}

async function doSignOut() {
  await sb.auth.signOut();
  currentUser = null; currentProfile = null;
  document.getElementById('already-state').classList.remove('visible');
  showLoginForm();
}

function showError(el, msg) { el.textContent = msg; el.classList.add('visible'); }

init();
</script>
</body>
</html>
